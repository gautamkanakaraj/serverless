<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Lambda Platform</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #2d2d2d;
            --text-main: #d4d4d4;
            --accent: #007acc;
            --accent-hover: #005f9e;
            --terminal-green: #4af626;
        }
        body, html {
            margin: 0; padding: 0; height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column;
        }
        /* Header */
        header {
            background-color: #333; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #444;
        }
        header h1 { margin: 0; font-size: 1.2rem; }
        
        /* Main Layout */
        .workspace { display: flex; flex: 1; overflow: hidden; }
        
        /* Left Pane - Editor */
        .editor-pane { flex: 7; display: flex; flex-direction: column; border-right: 1px solid #444; }
        .editor-header { background: #252526; padding: 10px; font-size: 0.9rem; }
        textarea {
            flex: 1; background-color: var(--bg-dark); color: #9cdcfe;
            font-family: 'Courier New', Courier, monospace; font-size: 1rem;
            padding: 15px; border: none; resize: none; outline: none;
        }
        
        /* Right Pane - Sidebar */
        .sidebar { flex: 3; background-color: var(--bg-panel); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        button {
            background-color: var(--accent); color: white; border: none;
            padding: 15px; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        button:hover { background-color: var(--accent-hover); }
        .url-box { display: flex; flex-direction: column; gap: 8px; }
        .url-box input {
            padding: 10px; background: #1e1e1e; border: 1px solid #555;
            color: var(--text-main); border-radius: 4px; font-family: monospace;
        }

        /* Bottom Pane - Logs */
        .bottom-pane {
            height: 30%; background-color: #000; border-top: 1px solid #444;
            display: flex; flex-direction: column;
        }
        .log-header { background: #252526; padding: 5px 15px; font-size: 0.85rem; border-bottom: 1px solid #333; }
        .terminal {
            flex: 1; padding: 15px; font-family: 'Courier New', Courier, monospace;
            color: var(--terminal-green); overflow-y: auto; font-size: 0.9rem; white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mini-Lambda Platform</h1>
        <span>User: test@minilambda.com</span>
    </header>

    <div class="workspace">
        <div class="editor-pane">
            <div class="editor-header">index.js</div>
            <textarea id="codeEditor" spellcheck="false">// Write your serverless function here...
function handler(event) {
    console.log("Hello from Mini-Lambda!");
    return { status: 200, message: "Success" };
}</textarea>
        </div>

        <div class="sidebar">
            <button id="deployBtn">🚀 Deploy Function</button>
            <div class="url-box">
                <label>Public URL (Trigger endpoint):</label>
                <input type="text" id="publicUrl" readonly placeholder="Waiting for deployment...">
            </div>
        </div>
    </div>

    <div class="bottom-pane">
        <div class="log-header">Execution Logs</div>
        <div class="terminal" id="terminalOutput">System ready. Waiting for deployment...</div>
    </div>

    <script>
        
        const deployBtn = document.getElementById('deployBtn');
        const codeEditor = document.getElementById('codeEditor');
        const publicUrlField = document.getElementById('publicUrl');
        const terminal = document.getElementById('terminalOutput');

        function logToTerminal(message) {
            const time = new Date().toLocaleTimeString();
            terminal.innerHTML += `\n[${time}] ${message}`;
            terminal.scrollTop = terminal.scrollHeight; // Auto-scroll
        }

        deployBtn.addEventListener('click', async () => {
            logToTerminal("Initiating deployment to Control Plane...");
            deployBtn.disabled = true;
            deployBtn.innerText = "Deploying...";

            try {
                // Hitting the Go API Gateway we built
                const response = await fetch('http://localhost:8080/api/deploy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Using the dummy user we inserted into Neon Postgres
                    body: JSON.stringify({
                        user_id: "123e4567-e89b-12d3-a456-426614174000", 
                        code_content: codeEditor.value
                    })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                
                logToTerminal("Deployment successful! Saved to Neon Postgres.");
                
                // Construct the full trigger URL
                const fullUrl = `http://localhost:8080${data.public_url}`;
                publicUrlField.value = fullUrl;
                logToTerminal(`Function is now live at: ${fullUrl}`);
                logToTerminal(`Copy and paste the URL into your browser to trigger execution.`);

            } catch (error) {
                logToTerminal(`ERROR: Failed to deploy. Is your Go server running? (${error.message})`);
            } finally {
                deployBtn.disabled = false;
                deployBtn.innerText = "🚀 Deploy Function";
            }
        });
    </script>
</body>
</html>
